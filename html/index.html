    </div>
    <script>
        let toggle = false;

        const fadeIn = [
            { opacity: 0 },
            { opacity: 1 }
        ];
        const fadeOut = [
            { opacity: 1 },
            { opacity: 0 }
        ];

        const roateIn = [
            { rotate: '0deg' },
            { rotate: '180deg' }
        ];
        const roateOut = [
            { rotate: '180deg' },
            { rotate: '0deg' }
        ];


        const KategoriaDIV = document.getElementById("KategoriaDIV");
        const navIcon = document.getElementById("navIcon");

        function Lenyomva() {
            if (!toggle) {
                KategoriaDIV.style.display = "flex";
                KategoriaDIV.animate(fadeIn, { duration: 100 });

                navIcon.animate(roateIn, { duration: 100 }).onfinish = () => {
                    navIcon.style.transform = "rotate(180deg)";
                };

                toggle = true;
            } else {
                KategoriaDIV.animate(fadeOut, { duration: 100 }).onfinish = () => {
                    KategoriaDIV.style.display = "none";
                };

                navIcon.animate(roateOut, { duration: 100 }).onfinish = () => {
                    navIcon.style.transform = "rotate(0deg)";
                };

                toggle = false;
            }
        }

        for (let i = 0; i < 10; i++) {
            let cardDiv = document.createElement("div")
            cardDiv.classList.add("cardDiv");
            let cardImgDiv = document.createElement("div");
            cardImgDiv.classList.add("cardImgDiv");
            cardDiv.appendChild(cardImgDiv);
            let cardImg = document.createElement("img");
            cardImg.classList.add("cardImg");
            cardImg.src = "../imgs/placeholder.png";
            cardImgDiv.appendChild(cardImg);
            let cardName = document.createElement("p");
            cardName.classList.add("cardName");
            cardName.innerText = "Laci Kábele";
            cardDiv.appendChild(cardName);
            let cardPrice = document.createElement("p");
            cardPrice.classList.add("cardPrice");
            cardPrice.innerText = "5000 ft";
            cardDiv.appendChild(cardPrice);
            document.querySelector(".contentbox").appendChild(cardDiv);
        }



    </script>
</body>
